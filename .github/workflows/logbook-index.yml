name: Logbook index

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate logbook index
        run: python scripts/logbook_index.py

      - name: Create pull request for index update
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(logbook): update logbook index"
          title: "chore(logbook): update logbook index"
          body: |
            Automated update of `logbook/README.md`.
          branch: "automation/logbook-index"
          delete-branch: true
          add-paths: |
            logbook/README.md
